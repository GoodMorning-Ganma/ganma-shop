<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>管理面板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --sidebar-width: 250px;
        }

        body {
            min-height: 100vh;
            background-color: #f8f9fa;
            overflow-x: hidden;
        }

        /* 侧边栏优化 */
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar-collapsed {
            transform: translateX(calc(-1 * var(--sidebar-width)));
        }

        /* 移动端遮罩 */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 999;
            display: none;
        }

        /* 主内容区优化 */
        .main-content {
            margin-left: var(--sidebar-width);
            transition: margin 0.3s ease;
            overflow: hidden;
        }

        @media (max-width: 992px) {
            .main-content {
                margin-left: 0;
            }
        }

        /* 订单卡片样式 */
        .order-card {
            transition: box-shadow 0.2s;
        }

        .order-card:hover {
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
        }

        /* 移动端表格优化 */
        .order-mobile-view {
            display: none;
        }

        @media (max-width: 768px) {
            .order-desktop-view {
                display: none;
            }
            .order-mobile-view {
                display: block;
            }
        }

        .order-card-new {
            background-color: var(--bs-success-bg-subtle);
            border: 1px solid var(--bs-success-border-subtle) !important;
        }

        .admin-notif-bell.pulse .bi-bell {
            animation: admin-bell-pulse 1.2s ease-in-out infinite;
        }

        @keyframes admin-bell-pulse {
            0%, 100% { transform: rotate(0deg); }
            15% { transform: rotate(-12deg); }
            30% { transform: rotate(12deg); }
            45% { transform: rotate(-8deg); }
            60% { transform: rotate(0deg); }
        }

        .toast-container-admin {
            z-index: 1080;
        }

        .admin-sidebar-toggle {
            flex-shrink: 0;
            width: 2.5rem;
            height: 2.5rem;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.38);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: background-color 0.15s ease, border-color 0.15s ease;
        }

        .admin-sidebar-toggle:hover,
        .admin-sidebar-toggle:focus {
            background: rgba(255, 255, 255, 0.22);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.55);
        }

        .admin-sidebar-toggle:focus-visible {
            outline: 2px solid rgba(255, 255, 255, 0.6);
            outline-offset: 2px;
        }

        .admin-notif-order-scroll {
            max-height: 220px;
            overflow-y: auto;
        }

        .admin-notif-order-row.admin-notif-read {
            opacity: 0.65;
            background-color: rgba(0, 0, 0, 0.03);
        }

        #sidebar > .d-flex.flex-column {
            height: 100%;
            min-height: 0;
        }

        #sidebar nav.flex-grow-1 {
            min-height: 0;
        }

        #sidebar .admin-sidebar-welcome {
            padding-left: 0.75rem;
            padding-right: 0.75rem;
        }

        .admin-welcome-inner {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.65rem 0.75rem;
            border-radius: 0.65rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.06) inset;
        }

        .admin-welcome-avatar {
            width: 2.5rem;
            height: 2.5rem;
            min-width: 2.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 700;
            line-height: 1;
            color: #fff;
            background: linear-gradient(145deg, #6b8aa8 0%, #3d5568 100%);
            border: 1px solid rgba(255, 255, 255, 0.22);
        }

        .admin-welcome-meta {
            min-width: 0;
            flex: 1;
        }

        .admin-welcome-label {
            font-size: 0.68rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.52);
            margin-bottom: 0.12rem;
        }

        .admin-welcome-name {
            font-size: 0.94rem;
            font-weight: 600;
            color: #fff;
            line-height: 1.25;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (max-width: 992px) {
            .admin-welcome-avatar {
                width: 2.35rem;
                height: 2.35rem;
                min-width: 2.35rem;
                font-size: 0.92rem;
            }

            .admin-welcome-inner {
                padding: 0.55rem 0.65rem;
            }
        }

    </style>
</head>
<body class="d-flex">
<!-- 侧边栏 -->
<div id="sidebar" class="bg-dark text-white position-fixed sidebar-collapsed">
    <div class="d-flex flex-column h-100">
        <h3 class="text-center py-3 mb-4 border-bottom">
            <a href="/admin/index" class="text-white text-decoration-none">管理面板</a>
        </h3>
        <nav class="flex-grow-1 px-3 overflow-auto">
            <div class="list-group list-group-flush">
                <a href="/admin/users" class="list-group-item list-group-item-action bg-dark text-white border-0">
                    <i class="bi bi-people me-2"></i>管理员列表
                </a>
                <a href="/admin/products" class="list-group-item list-group-item-action bg-dark text-white border-0">
                    <i class="bi bi-box-seam me-2"></i>商品管理
                </a>
                <a href="/ganma/index" class="list-group-item list-group-item-action bg-dark text-white border-0">
                    <i class="bi bi-shop-window me-2"></i>前往商城
                </a>
            </div>
        </nav>
        <div class="flex-shrink-0 border-top border-secondary border-opacity-25">
            <div class="admin-sidebar-welcome pt-3 pb-2" th:if="${welcomeName != null}">
                <div class="admin-welcome-inner" role="status">
                    <div class="admin-welcome-avatar" aria-hidden="true"
                         th:text="${#strings.substring(welcomeName, 0, 1)}">A</div>
                    <div class="admin-welcome-meta">
                        <div class="admin-welcome-label">欢迎回来</div>
                        <div class="admin-welcome-name" th:text="${welcomeName}">用户</div>
                    </div>
                </div>
            </div>
            <div class="px-3 pb-3" th:classappend="${welcomeName != null} ? ' pt-2' : ' pt-3'">
                <a th:href="${isLoggedIn ? '/auth/logout' : '/auth/login'}"
                   class="btn btn-outline-light w-100">
                    <i th:class="${isLoggedIn ? 'bi-box-arrow-right' : 'bi-box-arrow-in-right'}" class="bi me-2"></i>
                    <span th:text="${isLoggedIn ? '登出' : '登录'}"></span>
                </a>
            </div>
        </div>
    </div>
</div>

<!-- 移动端遮罩 -->
<div class="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- 主内容区 -->
<div class="main-content flex-grow-1">
    <div class="container-fluid p-3 p-lg-4">
        <!-- 订单列表 -->
        <div class="card border-0 shadow">
            <div class="card-header bg-dark text-white py-3">
                <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
                    <div class="d-flex align-items-center gap-2 min-w-0 flex-grow-1 me-2">
                        <button type="button" class="admin-sidebar-toggle d-lg-none"
                                onclick="toggleSidebar()" aria-label="打开侧栏菜单">
                            <i class="bi bi-list fs-4" aria-hidden="true"></i>
                        </button>
                        <h5 class="mb-0 text-white text-truncate">
                            <i class="bi bi-receipt me-2 d-none d-sm-inline"></i>订单管理
                        </h5>
                    </div>
                    <div class="dropdown flex-shrink-0">
                        <button type="button"
                                class="btn btn-outline-light btn-sm position-relative admin-notif-bell d-flex align-items-center gap-1"
                                id="adminOrderNotifToggle"
                                data-bs-toggle="dropdown"
                                data-bs-auto-close="outside"
                                aria-expanded="false"
                                aria-label="订单通知">
                            <i class="bi bi-bell fs-5"></i>
                            <span id="adminOrderNotifBadge"
                                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow" style="min-width: min(100vw - 2rem, 300px);"
                            aria-labelledby="adminOrderNotifToggle">
                            <li><h6 class="dropdown-header px-3 mb-0">订单通知</h6></li>
                            <li class="px-3 pb-1">
                                <small class="text-muted" id="adminOrderNotifSummary">正在同步…</small>
                            </li>
                            <li class="px-0 py-0" th:if="${orderDetails != null && !orderDetails.isEmpty()}">
                                <div class="px-3 pt-2 pb-1 small text-muted">最近订单 · 单条已读</div>
                                <div class="admin-notif-order-scroll border-top border-secondary border-opacity-25">
                                    <div th:each="orderDTO, iter : ${orderDetails}" th:if="${iter.index < 8}"
                                         class="admin-notif-order-row d-flex align-items-start justify-content-between gap-2 px-3 py-2 border-bottom border-secondary border-opacity-25"
                                         th:attr="data-notif-order-id=${orderDTO.order.id},
                                                  data-notif-order-ms=${orderDTO.order.createTime != null ? orderDTO.order.createTime.getTime() : 0}">
                                        <div class="min-w-0 flex-grow-1">
                                            <div class="small fw-semibold text-truncate"
                                                 th:text="${orderDTO.product.name}">商品</div>
                                            <div class="text-muted" style="font-size: 0.75rem;"
                                                 th:text="${orderDTO.order.createTime != null ? #dates.format(orderDTO.order.createTime, 'dd/MM HH:mm') : '—'}"></div>
                                        </div>
                                        <button type="button"
                                                class="btn btn-sm btn-outline-secondary flex-shrink-0 py-0 px-2"
                                                th:attr="data-mark-read-order-id=${orderDTO.order.id}">
                                            标为已读
                                        </button>
                                    </div>
                                </div>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <button type="button" class="dropdown-item" id="adminMarkOrdersSeen">
                                    <i class="bi bi-check2-all me-2"></i>全部标为已读
                                </button>
                            </li>
                            <li>
                                <a class="dropdown-item" href="/admin/order">
                                    <i class="bi bi-list-ul me-2"></i>查看全部订单
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- 桌面视图 -->
            <div class="card-body order-desktop-view">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>用户</th>
                            <th>商品</th>
                            <th class="text-end">数量</th>
                            <th class="text-end">金额</th>
                            <th>联系方式</th>
                            <th>创建时间</th>
                            <th>状态</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="orderDTO : ${orderDetails}"
                            th:attr="data-order-ms=${orderDTO.order.createTime != null ? orderDTO.order.createTime.getTime() : 0},
                                    data-order-id=${orderDTO.order.id}">
                            <td>
                                <div class="fw-semibold" th:text="${orderDTO.user.username}"></div>
                                <small class="text-muted" th:text="${orderDTO.user.email}"></small>
                            </td>
                            <td th:text="${orderDTO.product.name}"></td>
                            <td class="text-end" th:text="${orderDTO.order.quantity}"></td>
                            <td class="text-end" th:text="'RM' + ${#numbers.formatDecimal(orderDTO.order.price * orderDTO.order.quantity, 1, 2)}"></td>
                            <td>
                                <div th:text="${orderDTO.user.phone}"></div>
                                <small class="text-muted" th:text="${orderDTO.user.address}"></small>
                            </td>
                            <td th:text="${#dates.format(orderDTO.order.createTime, 'dd-MM-yyyy HH:mm')}"></td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                            <span th:text="${orderDTO.order.status}"
                                                  th:classappend="${orderDTO.order.status == 'Paid'} ? ' bg-primary' : (${orderDTO.order.status == 'Pending'} ? ' bg-warning' : ' bg-success')"
                                                  class="badge order-status-badge"></span>
                                    <button th:if="${orderDTO.order.status == 'Paid'}"
                                            class="btn btn-sm btn-outline-success"
                                            th:data-orderid="${orderDTO.order.id}"
                                            onclick="updateOrderStatus(this)">
                                        <i class="bi bi-truck"></i> 标记为已送达
                                    </button>
                                    <!-- delivered状态显示禁用按钮 -->
                                    <button th:if="${orderDTO.order.status == 'Delivered'}"
                                            class="btn btn-sm btn-outline-secondary"
                                            disabled>
                                        <i class="bi bi-check2"></i> 已送达
                                    </button>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="order-mobile-view px-2 py-3">
                <div class="row row-cols-1 g-3">
                    <div class="col" th:each="orderDTO : ${orderDetails}">
                        <div class="card order-card shadow-sm border-0 rounded-4"
                             th:attr="data-order-ms=${orderDTO.order.createTime != null ? orderDTO.order.createTime.getTime() : 0},
                                    data-order-id=${orderDTO.order.id}">
                            <div class="card-body">
                                <h5 class="card-title mb-2 d-flex justify-content-between align-items-center">
                                    <span th:text="${orderDTO.product.name}"></span>
                                    <span th:text="${orderDTO.order.status}"
                                          th:classappend="${orderDTO.order.status == 'Paid'} ? ' bg-primary' : (${orderDTO.order.status == 'Pending'} ? ' bg-warning' : ' bg-success')"
                                          class="badge order-status-badge"></span>
                                </h5>

                                <hr class="my-2">

                                <div class="mb-2">
                                    <i class="bi bi-person-fill text-primary me-1"></i>
                                    <strong>用户：</strong>
                                    <span th:text="${orderDTO.user.username}"></span>
                                </div>
                                <div class="mb-2">
                                    <i class="bi bi-box-seam text-info me-1"></i>
                                    <strong>数量：</strong>
                                    <span th:text="${orderDTO.order.quantity}"></span>
                                </div>
                                <div class="mb-2">
                                    <i class="bi bi-currency-dollar text-success me-1"></i>
                                    <strong>金额：</strong>
                                    <span th:text="'RM' + ${#numbers.formatDecimal(orderDTO.order.price * orderDTO.order.quantity, 1, 2)}"></span>
                                </div>

                                <hr class="my-2">

                                <div class="mb-2">
                                    <i class="bi bi-telephone-fill text-warning me-1"></i>
                                    <strong>电话：</strong>
                                    <span th:text="${orderDTO.user.phone}"></span>
                                </div>
                                <div class="mb-2">
                                    <i class="bi bi-geo-alt-fill text-danger me-1"></i>
                                    <strong>地址：</strong>
                                    <span th:text="${orderDTO.user.address}"></span>
                                </div>

                                <div class="mb-2">
                                    <i class="bi bi-clock-fill text-secondary me-1"></i>
                                    <strong>创建时间：</strong>
                                    <span th:text="${#dates.format(orderDTO.order.createTime, 'dd-MM-yyyy HH:mm')}"></span>
                                </div>

                                <div class="mt-3">
                                    <button th:if="${orderDTO.order.status == 'Paid'}"
                                            class="btn btn-sm btn-outline-success w-100 rounded-pill"
                                            th:data-orderid="${orderDTO.order.id}"
                                            onclick="updateOrderStatus(this)">
                                        <i class="bi bi-truck"></i> 标记为已送达
                                    </button>
                                    <button th:if="${orderDTO.order.status == 'Delivered'}"
                                            class="btn btn-sm btn-outline-secondary w-100 rounded-pill"
                                            disabled>
                                        <i class="bi bi-check2"></i> 已送达
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(orderDetails)}" class="card-body text-center py-5">
                <i class="bi bi-inbox fs-1 text-muted"></i>
                <p class="text-muted mt-3">当前无任何订单</p>
            </div>
        </div>
    </div>
</div>

<div class="toast-container toast-container-admin position-fixed bottom-0 end-0 p-3">
    <div id="adminNewOrderToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body">
                <i class="bi bi-cart-check me-2"></i>有新的订单，请刷新页面查看最新列表。
                <button type="button" class="btn btn-sm btn-light ms-2" onclick="location.reload()">刷新</button>
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="关闭"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 初始化侧边栏状态（强化移动端处理）
    function initSidebar() {
        const sidebar = document.getElementById('sidebar');
        const isMobile = window.innerWidth <= 992;

        // 强制移除所有可能冲突的样式
        sidebar.classList.remove('sidebar-collapsed');
        void sidebar.offsetWidth; // 触发重绘

        // 根据设备类型应用正确状态
        if (isMobile) {
            sidebar.style.transform = `translateX(-${window.innerWidth}px)`; // 确保完全移出屏幕
            setTimeout(() => {
                sidebar.classList.add('sidebar-collapsed');
            }, 10);
        } else {
            sidebar.classList.remove('sidebar-collapsed');
        }
    }

    // 页面加载时强制初始化
    document.addEventListener('DOMContentLoaded', function() {
        initSidebar();
        window.addEventListener('load', initSidebar); // 双保险确保执行
    });

    // 优化后的侧边栏切换函数
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.querySelector('.sidebar-overlay');
        const isMobile = window.innerWidth <= 992;

        if (isMobile) {
            const isCollapsed = sidebar.classList.contains('sidebar-collapsed');
            sidebar.style.transform = isCollapsed ? 'translateX(0)' : `translateX(-${sidebar.offsetWidth}px)`;
            sidebar.classList.toggle('sidebar-collapsed');
            overlay.style.display = isCollapsed ? 'block' : 'none';
        }
    }

    // 增强的resize监听
    window.addEventListener('resize', () => {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.querySelector('.sidebar-overlay');

        if (window.innerWidth > 992) {
            sidebar.classList.remove('sidebar-collapsed');
            sidebar.style.transform = '';
            overlay.style.display = 'none';
        } else {
            if (!sidebar.classList.contains('sidebar-collapsed')) {
                sidebar.style.transform = `translateX(-${sidebar.offsetWidth}px)`;
                sidebar.classList.add('sidebar-collapsed');
            }
        }
    });
</script>
<script>
    // 更新订单状态的函数
    function updateOrderStatus(button) {
    const orderId = button.getAttribute('data-orderid');

    const token = document.querySelector('meta[name="_csrf"]')?.content;
    const header = document.querySelector('meta[name="_csrf_header"]')?.name;

    const headers = new Headers();
    headers.append('Content-Type', 'application/json');
    if (token && header) {
        headers.append(header, token);
    }

    fetch(`/admin/orders/${orderId}/deliver`, {
        method: 'POST',
        headers: headers
    })
    .then(response => {
        if (response.ok) {
            // 通过最近的父元素查找包含状态的 span
            const card = button.closest('.card, tr');
            const statusBadge = card.querySelector('.order-status-badge');

            if (statusBadge) {
                statusBadge.textContent = 'Delivered';
                statusBadge.className = 'badge bg-success order-status-badge';
            }

            // 替换按钮为已送达状态
            const newButton = document.createElement('button');
            newButton.className = 'btn btn-sm btn-outline-secondary w-100';
            newButton.disabled = true;
            newButton.innerHTML = '<i class="bi bi-check2"></i> 已送达';
            button.parentNode.replaceChild(newButton, button);
        } else {
            alert('状态更新失败，请重试');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('请求失败: ' + error.message);
    });
}
</script>
<script>
    (function () {
        const LS_KEY = 'ganma_admin_orders_seen_at_ms';
        const LS_READ_IDS = 'ganma_admin_orders_read_ids';
        const POLL_MS = 25000;

        function getSeenAtMs() {
            const v = localStorage.getItem(LS_KEY);
            return v != null ? parseInt(v, 10) : null;
        }

        function getReadIdSet() {
            try {
                const raw = localStorage.getItem(LS_READ_IDS);
                if (!raw) return new Set();
                const arr = JSON.parse(raw);
                if (!Array.isArray(arr)) return new Set();
                return new Set(arr.filter(Boolean));
            } catch (e) {
                return new Set();
            }
        }

        function saveReadIdSet(set) {
            localStorage.setItem(LS_READ_IDS, JSON.stringify(Array.from(set)));
        }

        function isRowUnread(ms, orderId) {
            const seen = parseInt(localStorage.getItem(LS_KEY) || '0', 10);
            if (isNaN(ms) || ms <= seen) return false;
            if (orderId && getReadIdSet().has(orderId)) return false;
            return true;
        }

        function maxOrderMsOnPage() {
            let max = 0;
            document.querySelectorAll('[data-order-ms]').forEach(function (el) {
                const ms = parseInt(el.getAttribute('data-order-ms'), 10);
                if (!isNaN(ms) && ms > max) max = ms;
            });
            return max;
        }

        function ensureInitialSeenAt() {
            if (getSeenAtMs() !== null) return;
            const max = maxOrderMsOnPage();
            localStorage.setItem(LS_KEY, String(max > 0 ? max : Date.now()));
        }

        function applyNewOrderHighlight() {
            document.querySelectorAll('[data-order-ms]').forEach(function (el) {
                const ms = parseInt(el.getAttribute('data-order-ms'), 10);
                const orderId = el.getAttribute('data-order-id');
                const isNew = isRowUnread(ms, orderId);
                if (el.tagName === 'TR') {
                    el.classList.toggle('table-success', isNew);
                } else {
                    el.classList.toggle('order-card-new', isNew);
                }
            });
        }

        function applyNotifDropdownReadState() {
            document.querySelectorAll('[data-notif-order-id]').forEach(function (row) {
                const id = row.getAttribute('data-notif-order-id');
                const ms = parseInt(row.getAttribute('data-notif-order-ms'), 10);
                const unread = isRowUnread(ms, id);
                row.classList.toggle('admin-notif-read', !unread);
                const btn = row.querySelector('[data-mark-read-order-id]');
                if (!btn) return;
                btn.disabled = !unread;
                btn.textContent = unread ? '标为已读' : '已读';
            });
        }

        function setBadgeCount(n) {
            const badge = document.getElementById('adminOrderNotifBadge');
            const bell = document.getElementById('adminOrderNotifToggle');
            if (!badge || !bell) return;
            if (n > 0) {
                badge.textContent = n > 99 ? '99+' : String(n);
                badge.classList.remove('d-none');
                bell.classList.add('pulse');
            } else {
                badge.classList.add('d-none');
                bell.classList.remove('pulse');
            }
        }

        function setSummary(text) {
            const el = document.getElementById('adminOrderNotifSummary');
            if (el) el.textContent = text;
        }

        function fetchUnreadCount() {
            const seen = getSeenAtMs();
            if (seen === null) return Promise.resolve(0);
            return fetch('/admin/api/orders/new-ids-since?after=' + encodeURIComponent(String(seen)))
                .then(function (r) {
                    if (r.status === 401) return { ids: [] };
                    if (!r.ok) throw new Error('poll failed');
                    return r.json();
                })
                .then(function (data) {
                    const ids = Array.isArray(data.ids) ? data.ids : [];
                    const read = getReadIdSet();
                    return ids.filter(function (id) {
                        return id && !read.has(id);
                    }).length;
                });
        }

        let lastPolledCount = -1;

        function poll() {
            fetchUnreadCount().then(function (count) {
                setBadgeCount(count);
                if (lastPolledCount >= 0 && count > lastPolledCount) {
                    const toastEl = document.getElementById('adminNewOrderToast');
                    if (toastEl && typeof bootstrap !== 'undefined') {
                        const t = bootstrap.Toast.getOrCreateInstance(toastEl);
                        t.show();
                    }
                }
                lastPolledCount = count;
                if (count > 0) {
                    setSummary('有 ' + count + ' 笔未读新订单（可逐条标为已读）');
                } else {
                    setSummary('暂无未读新订单');
                }
            }).catch(function () {
                setSummary('通知同步失败，请检查网络');
            });
        }

        function markOrderRead(orderId) {
            if (!orderId) return;
            const set = getReadIdSet();
            set.add(orderId);
            saveReadIdSet(set);
            applyNewOrderHighlight();
            applyNotifDropdownReadState();
            lastPolledCount = -1;
            poll();
        }

        function markAllSeen() {
            const max = maxOrderMsOnPage();
            const cur = parseInt(localStorage.getItem(LS_KEY) || '0', 10);
            const next = max > 0 ? Math.max(cur, max) : Date.now();
            localStorage.setItem(LS_KEY, String(next));
            localStorage.removeItem(LS_READ_IDS);
            applyNewOrderHighlight();
            applyNotifDropdownReadState();
            lastPolledCount = -1;
            poll();
        }

        document.addEventListener('DOMContentLoaded', function () {
            ensureInitialSeenAt();
            applyNewOrderHighlight();
            applyNotifDropdownReadState();
            poll();
            setInterval(poll, POLL_MS);
            var btn = document.getElementById('adminMarkOrdersSeen');
            if (btn) btn.addEventListener('click', markAllSeen);
            document.addEventListener('click', function (e) {
                var t = e.target.closest('[data-mark-read-order-id]');
                if (!t || t.disabled) return;
                var id = t.getAttribute('data-mark-read-order-id');
                if (!id) return;
                e.preventDefault();
                markOrderRead(id);
            });
        });
    })();
</script>
</body>
</html>
