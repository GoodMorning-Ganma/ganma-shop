<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name}">Product Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* Match home.html — single calm palette */
        :root {
            --gm-brand: #3a5568;
            --gm-brand-hover: #2d4250;
            --gm-brand-soft: rgba(58, 85, 104, 0.1);
            --gm-text: #1e2930;
            --gm-text-muted: #4a5f6d;
            --gm-border: rgba(58, 85, 104, 0.14);
            --gm-surface: #f6f7f5;
            --gm-card-radius: 0.875rem;
        }

        body {
            background-color: var(--gm-surface);
            color: var(--gm-text);
            font-family: "Segoe UI", system-ui, -apple-system, Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 1.0625rem;
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
        }

        .navbar-gm {
            background: var(--gm-brand);
            box-shadow: 0 2px 12px rgba(45, 66, 80, 0.18);
        }

        .navbar-gm .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.01em;
            font-size: 1.35rem;
        }

        .navbar-gm .nav-link {
            color: rgba(255, 255, 255, 0.95) !important;
            font-weight: 500;
            font-size: 1.05rem;
            padding: 0.65rem 0.85rem !important;
            min-height: 2.75rem;
            border-radius: 0.5rem;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .navbar-gm .nav-link:hover,
        .navbar-gm .nav-link:focus {
            color: #fff !important;
            background-color: rgba(255, 255, 255, 0.14);
        }

        .navbar-gm .btn-nav-cta {
            font-weight: 600;
            font-size: 1.05rem;
            padding: 0.55rem 1.25rem;
            min-height: 2.75rem;
            color: var(--gm-brand) !important;
            border: none;
        }

        .navbar-gm .btn-nav-cta:hover {
            background: #f0f2f1 !important;
            color: var(--gm-brand-hover) !important;
        }

        .navbar-gm .btn-back-mobile {
            color: var(--gm-brand) !important;
            font-weight: 600;
            min-width: 2.5rem;
            min-height: 2.5rem;
        }

        /* Detail card — same language as home product cards */
        .product-detail-wrap {
            border: 1px solid var(--gm-border);
            border-radius: var(--gm-card-radius);
            background: #fff;
            overflow: hidden;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        @media (hover: hover) and (pointer: fine) {
            .product-detail-wrap:hover {
                box-shadow: 0 8px 28px rgba(45, 66, 80, 0.12);
                border-color: rgba(58, 85, 104, 0.22);
            }
        }

        .product-image-container {
            padding: 1.25rem 1.25rem 1rem;
            background: #eef1ef;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 240px;
        }

        @media (min-width: 768px) {
            .product-image-container {
                padding: 1.75rem;
                min-height: 100%;
            }
        }

        .product-image {
            max-width: 100%;
            height: auto;
            border-radius: calc(var(--gm-card-radius) - 0.125rem);
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        @media (hover: hover) and (pointer: fine) {
            .product-image:hover {
                transform: scale(1.02);
            }
        }

        .price-text {
            color: var(--gm-brand-hover);
            font-weight: 700;
            font-size: clamp(1.125rem, 2.5vw, 1.35rem);
            letter-spacing: 0.01em;
        }

        .product-title {
            color: var(--gm-text);
            font-size: clamp(1.35rem, 4vw, 1.75rem);
            line-height: 1.25;
            letter-spacing: 0.01em;
        }

        .quantity-input {
            width: 100%;
            max-width: 168px;
            border-radius: 0.65rem;
            overflow: hidden;
            border: 1px solid var(--gm-border);
        }

        .quantity-input .form-control {
            border: 0;
            background: #f0f2f1;
            color: var(--gm-text);
            font-size: 1.0625rem;
        }

        .quantity-input .btn-qty {
            border: 0;
            background: #e4e8e6;
            color: var(--gm-text);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .quantity-input .btn-qty:hover,
        .quantity-input .btn-qty:focus {
            background: #d8deda;
            color: var(--gm-brand-hover);
        }

        .purchase-actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        @media (min-width: 768px) {
            .purchase-actions {
                flex-direction: row;
                align-items: stretch;
                gap: 1rem;
            }

            .purchase-actions .btn-add-cart {
                flex: 1;
                min-width: 0;
            }
        }

        .btn-gm-primary {
            background-color: var(--gm-brand);
            border-color: var(--gm-brand);
            font-weight: 600;
            color: #fff;
        }

        .btn-gm-primary:hover,
        .btn-gm-primary:focus {
            background-color: var(--gm-brand-hover);
            border-color: var(--gm-brand-hover);
            color: #fff;
        }

        .btn-add-cart {
            width: 100%;
            padding: 0.85rem 1.25rem;
            border-radius: 0.65rem;
            font-size: 1.0625rem;
        }

        @media (min-width: 768px) {
            .btn-add-cart {
                width: auto;
            }
        }

        .description-box {
            background-color: var(--gm-brand-soft);
            border-radius: 0.65rem;
            padding: 1.1rem 1.2rem;
            border-left: 4px solid var(--gm-brand);
        }

        .description-heading {
            color: var(--gm-brand);
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.75rem;
        }

        .product-description {
            font-size: 1.0625rem;
            line-height: 1.65;
            color: var(--gm-text-muted);
        }

        .description-ingredients {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 0.4rem 0.75rem;
            grid-template-columns: 1fr;
        }

        @media (min-width: 480px) {
            .description-ingredients {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        .description-ingredients li {
            position: relative;
            padding-left: 1rem;
            font-size: 0.9375rem;
            line-height: 1.45;
            color: var(--gm-text-muted);
        }

        .description-ingredients li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0.55em;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--gm-brand);
            opacity: 0.75;
        }

        .description-lead {
            font-weight: 600;
            color: var(--gm-text);
            margin-bottom: 0.65rem;
            font-size: 1.0625rem;
            line-height: 1.45;
        }

        .trust-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem 1.25rem;
            padding-top: 0.25rem;
            color: var(--gm-text-muted);
        }

        .trust-row small {
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .product-detail-col {
            padding: 1.25rem 1.25rem 1.5rem;
        }

        @media (min-width: 768px) {
            .product-detail-col {
                padding: 1.75rem 1.75rem 1.75rem 1.25rem;
            }
        }

        footer.footer-gm {
            background: var(--gm-brand-hover);
            margin-top: 3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        footer.footer-gm h5 {
            font-size: 1.1rem;
        }

        footer.footer-gm a {
            color: rgba(255, 255, 255, 0.88);
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.2s ease;
        }

        footer.footer-gm a:hover {
            color: #fff;
            text-decoration: underline;
            text-underline-offset: 0.2em;
        }

        footer.footer-gm .text-white-50 {
            color: rgba(255, 255, 255, 0.82) !important;
            font-size: 0.98rem !important;
        }

        @media (max-width: 767.98px) {
            .product-detail-wrap {
                border-radius: 0.85rem;
            }

            .container.my-5 {
                margin-top: 1.25rem !important;
                margin-bottom: 2rem !important;
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }

            .description-box {
                padding: 1rem 1.05rem;
                max-height: min(42vh, 20rem);
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                overscroll-behavior: contain;
                box-shadow: inset 0 -1px 0 var(--gm-border);
            }

            .product-description,
            .description-ingredients li {
                font-size: max(16px, 0.9375rem);
            }

            .quantity-input .btn-qty {
                min-width: 48px;
                min-height: 48px;
                padding: 0.5rem;
            }

            .quantity-input .form-control {
                min-height: 48px;
                font-size: 1.05rem;
            }
        }

        @media (max-width: 575.98px) {
            .navbar-gm .navbar-brand {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-gm sticky-top">
    <div class="container py-1 py-lg-0">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/ganma/index">
            <span class="d-inline-flex align-items-center justify-content-center rounded-3 bg-white bg-opacity-10 px-2 py-1">
                <i class="bi bi-bag-heart-fill text-white"></i>
            </span>
            Ganma
        </a>

        <div class="d-flex align-items-center gap-2">
            <a href="javascript:void(0)" class="btn btn-light btn-back-mobile rounded-pill d-lg-none"
               onclick="goBack()" aria-label="Go back">
                <i class="bi bi-arrow-left"></i>
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mt-3 mt-lg-0 gap-lg-1">
                <li class="nav-item d-none d-lg-block">
                    <a class="nav-link d-flex align-items-center gap-2" href="javascript:void(0)" onclick="goBack()">
                        <i class="bi bi-arrow-left-short fs-5"></i><span>Back</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="/ganma/cart">
                        <i class="bi bi-cart3 fs-5"></i><span>Cart</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2"
                       th:href="${isLoggedIn ? '/ganma/account' : '/auth/login'}">
                        <i class="bi bi-person-circle fs-5"></i><span>Account</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="/ganma/favourite">
                        <i class="bi bi-heart fs-5"></i><span>Favourites</span>
                    </a>
                </li>
                <li class="nav-item" th:if="${isAdminUser}">
                    <a class="nav-link d-flex align-items-center gap-2" href="/admin/index">
                        <i class="bi bi-speedometer2 fs-5"></i><span>管理后台</span>
                    </a>
                </li>
            </ul>
            <div class="d-flex flex-column flex-lg-row align-items-stretch align-items-lg-center gap-2 mt-3 mt-lg-0 pb-3 pb-lg-0">
                <a class="btn btn-light btn-nav-cta rounded-pill"
                   th:href="${isLoggedIn ? '/auth/logout' : '/auth/login'}">
                    <i th:class="${isLoggedIn ? 'bi bi-box-arrow-right' : 'bi bi-box-arrow-in-right'}"></i>
                    <span class="ms-1" th:text="${isLoggedIn ? 'Logout' : 'Login'}">Login</span>
                </a>
            </div>
        </div>
    </div>
</nav>

<main>
    <div class="container my-5 px-3 px-lg-4">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="product-detail-wrap shadow-sm">
                    <div class="row g-0">
                        <!-- 产品图片 -->
                        <div class="col-md-6">
                            <div class="product-image-container">
                                <img th:src="@{'/images/' + ${product.imageName}}"
                                     class="img-fluid product-image"
                                     alt="Product Image">
                            </div>
                        </div>

                        <!-- 产品详情 -->
                        <div class="col-md-6 product-detail-col d-flex flex-column">
                            <h1 th:text="${product.name}"
                                class="product-title mb-2 fw-bold order-1 order-md-0"></h1>

                            <p class="price-text mb-3 order-2 order-md-0">
                                RM <span th:text="${#numbers.formatDecimal(product.price, 1, 2)}"></span>
                            </p>

                            <div class="description-box mb-2 mb-md-3 order-5 order-md-0 mt-3 mt-md-0">
                                <h2 class="description-heading">Description</h2>
                                <th:block th:with="desc=${product.description}">
                                    <th:block th:if="${#strings.contains(desc, 'Types of Whole Grains:')}">
                                        <p class="description-lead mb-0 mt-3"
                                           th:text="${#strings.substringBefore(desc, ':')} + ':'"></p>
                                        <ul class="description-ingredients mt-2">
                                            <li th:each="grain : ${#strings.arraySplit(#strings.trim(#strings.substringAfter(desc, ':')), ',')}"
                                                th:if="${!#strings.isEmpty(#strings.trim(grain))}"
                                                th:text="${#strings.trim(grain)}"></li>
                                        </ul>
                                    </th:block>
                                    <p th:unless="${#strings.contains(desc, 'Types of Whole Grains:')}"
                                       class="product-description mb-0 mt-3"
                                       th:text="${desc}"></p>
                                </th:block>
                            </div>

                            <form action="/ganma/cart/add" method="post" class="mb-2 order-3 order-md-0">
                                <input type="hidden" name="productId" th:value="${product.id}">

                                <div class="purchase-actions mb-3">
                                    <div class="input-group quantity-input flex-shrink-0">
                                        <button type="button" class="btn btn-qty"
                                                onclick="decrementQuantity()" aria-label="Decrease quantity">-</button>
                                        <input type="number" name="quantity" id="quantity"
                                               class="form-control text-center" value="1" min="1" inputmode="numeric"
                                               aria-label="Quantity">
                                        <button type="button" class="btn btn-qty"
                                                onclick="incrementQuantity()" aria-label="Increase quantity">+</button>
                                    </div>
                                    <button type="submit" class="btn btn-gm-primary btn-add-cart">
                                        <i class="bi bi-cart-plus me-2"></i>Add to Cart
                                    </button>
                                </div>
                            </form>

                            <div class="trust-row pt-2 order-4 order-md-0">
                                <small><i class="bi bi-shield-check" aria-hidden="true"></i> Secure checkout</small>
                                <small><i class="bi bi-truck" aria-hidden="true"></i> Free shipping</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="footer-gm py-5 text-light">
    <div class="container px-3 px-lg-4">
        <div class="row g-4 text-center text-md-start">
            <div class="col-md-4">
                <h5 class="fw-semibold mb-3">About</h5>
                <p class="text-white-50 mb-0">Curated picks and fair prices — your everyday shop.</p>
            </div>
            <div class="col-md-4">
                <h5 class="fw-semibold mb-3">Help</h5>
                <ul class="list-unstyled mb-0">
                    <li class="mb-2"><a href="#">Contact</a></li>
                    <li class="mb-2"><a href="#">Returns</a></li>
                    <li><a href="#">FAQs</a></li>
                </ul>
            </div>
            <div class="col-md-4">
                <h5 class="fw-semibold mb-3">Follow</h5>
                <div class="d-flex justify-content-center justify-content-md-start gap-3 fs-5">
                    <a href="#" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
                    <a href="#" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
                    <a href="#" aria-label="Twitter"><i class="bi bi-twitter-x"></i></a>
                </div>
            </div>
        </div>
        <hr class="border-secondary opacity-25 my-4">
        <p class="text-center text-white-50 mb-0">&copy; 2026 Ganma Shop. All rights reserved.</p>
    </div>
</footer>

<script>
    function incrementQuantity() {
        let quantityInput = document.getElementById('quantity');
        quantityInput.value = parseInt(quantityInput.value) + 1;
    }

    function decrementQuantity() {
        let quantityInput = document.getElementById('quantity');
        if (parseInt(quantityInput.value) > 1) {
            quantityInput.value = parseInt(quantityInput.value) - 1;
        }
    }

    function goBack() {
        window.history.back();
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            goBack();
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
